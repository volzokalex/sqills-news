<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F8F1E1" />
  <title>News — Sqills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <div class="identity-band" aria-hidden="true"></div>

    <header class="app-header">
      <p class="eyebrow">News</p>
      <h1 class="screen-title">What changed in AI</h1>
      <p class="screen-sub">Daily picks. Two minutes each. No hype.</p>
    </header>

    <nav class="filters" id="filters" aria-label="News filters">
      <button class="tag tag-active" data-filter="all"       type="button">For you</button>
      <button class="tag"            data-filter="beginners" type="button">Beginners</button>
      <button class="tag"            data-filter="builders"  type="button">Builders</button>
      <button class="tag"            data-filter="design"    type="button">Design</button>
      <button class="tag"            data-filter="video"     type="button">Video</button>
      <button class="tag"            data-filter="income"    type="button">Income</button>
      <button class="tag"            data-filter="founders"  type="button">Founders</button>
    </nav>

    <main class="feed" id="feed" aria-label="News feed">
      <!-- cards rendered by app.js -->
    </main>

    <p class="end-note" id="end-note">That's everything in this batch. New drops daily.</p>
  </div>

  <script src="news.js"></script>
  <script src="app.js"></script>
</body>
</html>
